name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image name prefix
        id: meta
        run: |
          REPO_LOWER=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
          echo "backend_image=ghcr.io/${REPO_LOWER}/backend" >> "$GITHUB_OUTPUT"
          echo "frontend_image=ghcr.io/${REPO_LOWER}/frontend" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}:latest
            ${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.meta.outputs.frontend_image }}:latest
            ${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-vps:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DEPLOY_SHA
          script: |
            set -e
            cd /app/travelplanner

            echo "=== Pulling latest images ==="
            docker compose pull

            echo "=== Starting services with zero-downtime ==="
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans

            echo "=== Waiting for health checks ==="
            sleep 10

            # Verify backend health
            for i in $(seq 1 12); do
              if docker compose exec -T backend wget --spider -q http://localhost:3000/api/health 2>/dev/null; then
                echo "Backend healthy after ${i}0 seconds"
                break
              fi
              if [ "$i" -eq 12 ]; then
                echo "Backend health check failed after 120s"
                exit 1
              fi
              sleep 10
            done

            # Clean up old images
            docker image prune -f --filter "until=48h"

            echo "=== Deployment complete: ${DEPLOY_SHA} ==="
