name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-typecheck-backend:
    name: Backend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - name: Security audit (high/critical only)
        run: npm audit --audit-level=high || true

  test-backend:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm test -- --ci --coverage --forceExit
        env:
          NODE_ENV: test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

  lint-and-typecheck-frontend:
    name: Frontend TypeCheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck-backend, test-backend, lint-and-typecheck-frontend]
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: travelplanner
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            package-lock.json

      - name: Install dependencies
        run: |
          cd backend && npm ci
          cd ../frontend && npm ci
          cd .. && npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create backend .env
        run: |
          cp backend/.env.example backend/.env
          sed -i 's/PORT=3000/PORT=3001/' backend/.env
          sed -i 's/REDIS_PASSWORD=redis_secure_password_change_me/REDIS_PASSWORD=/' backend/.env
          sed -i 's/RATE_LIMIT_TTL=60/RATE_LIMIT_TTL=1/' backend/.env
          sed -i 's/RATE_LIMIT_MAX=100/RATE_LIMIT_MAX=1000/' backend/.env

      - name: Start backend
        run: |
          cd backend
          npm run build
          node dist/main.js &
          sleep 10
        env:
          NODE_ENV: test
          PORT: 3001
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_DATABASE: travelplanner
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          JWT_SECRET: ci-test-jwt-secret
          JWT_REFRESH_SECRET: ci-test-refresh-secret

      - name: Verify backend health
        run: |
          for i in $(seq 1 12); do
            if curl -sf http://localhost:3001/api/health > /dev/null; then
              echo "Backend healthy"
              break
            fi
            echo "Waiting for backend... ($i)"
            sleep 5
          done

      - name: Start frontend
        run: |
          cd frontend
          npx expo export:web 2>/dev/null || true
          npx serve web-build -l 8081 &
          sleep 5
        env:
          EXPO_PUBLIC_API_URL: http://localhost:3001/api

      - name: Run E2E tests (primary suite)
        run: npx playwright test --project=chromium-mobile
        working-directory: tests
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 7

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: tests/test-results/
          retention-days: 7

  build-docker:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck-backend, test-backend, lint-and-typecheck-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Create backend .env for build
        run: cp backend/.env.example backend/.env

      - name: Build all services
        run: docker compose build
