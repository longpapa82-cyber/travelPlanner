# Phase 0.5 Nginx 설정 추가 사항
# 웹 서비스 접근 차단 및 앱 다운로드 유도

# /login, /register 리다이렉트 → Play Store
location = /login {
    return 302 https://play.google.com/store/apps/details?id=com.longpapa82.travelplanner;
}

location = /register {
    return 302 https://play.google.com/store/apps/details?id=com.longpapa82.travelplanner;
}

# React Native Web 앱 경로 차단 → 랜딩 페이지
location ~ ^/(home|trips|profile|settings|shared-trip) {
    return 302 /;
}

# 기존 index.html 접근 차단
location = /index.html {
    return 302 /;
}

# 참고: 아래 location 블록은 기존 nginx-default-modified.conf에 이미 있음
# 중복으로 추가하지 말 것

