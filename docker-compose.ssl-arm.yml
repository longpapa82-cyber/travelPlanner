version: '3.8'

# SSL overlay for OCI A1.Flex ARM instance (4 OCPU, 24GB RAM)
# Usage: docker compose -f docker-compose.yml -f docker-compose.arm.yml -f docker-compose.ssl-arm.yml up -d

services:
  proxy:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      DOMAIN_NEW: ${DOMAIN_NEW:-}
    depends_on:
      frontend:
        condition: service_healthy
    networks:
      - travelplanner
    restart: unless-stopped
    mem_limit: 64m
    cpus: 0.25
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    command: >
      /bin/sh -c "
        envsubst '$$DOMAIN $$DOMAIN_NEW' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf &&
        while :; do
          nginx -s reload 2>/dev/null || true;
          sleep 6h & wait $${!};
        done &
        nginx -g 'daemon off;'
      "

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"
    networks:
      - travelplanner
    mem_limit: 64m
    cpus: 0.1
    logging:
      driver: json-file
      options:
        max-size: '5m'
        max-file: '2'

volumes:
  certbot_conf:
  certbot_www:
