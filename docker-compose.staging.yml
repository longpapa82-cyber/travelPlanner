version: '3.8'

# Staging override — mirrors production but with relaxed resource limits
# Usage: docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d

services:
  # No SSL proxy in staging (accessed via SSH tunnel or internal network)
  frontend:
    environment:
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx/conf.d
    mem_limit: 128m
    cpus: 0.25
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  backend:
    environment:
      NODE_ENV: staging
    mem_limit: 512m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '5'

  postgres:
    mem_limit: 256m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '3'

  redis:
    mem_limit: 128m
    cpus: 0.25
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
