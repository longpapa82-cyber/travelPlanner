version: '3.8'

# Production override — adds SSL reverse proxy with Let's Encrypt
# Usage: DOMAIN=travelplanner.app docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  # SSL-terminating reverse proxy
  proxy:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    environment:
      DOMAIN: ${DOMAIN:-travelplanner.app}
    depends_on:
      frontend:
        condition: service_healthy
    networks:
      - travelplanner
    restart: unless-stopped
    # Reload nginx every 6 hours to pick up renewed certificates
    command: >
      /bin/sh -c "
        envsubst '$$DOMAIN' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf &&
        while :; do
          nginx -s reload 2>/dev/null || true;
          sleep 6h & wait $${!};
        done &
        nginx -g 'daemon off;'
      "

  # Let's Encrypt certificate renewal
  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - travelplanner

  # Override frontend to not expose ports directly (proxy handles it)
  frontend:
    ports: !reset []

  # Override backend to not expose ports directly
  backend:
    ports: !reset []

  # Don't expose DB/Redis to host in production
  postgres:
    ports: !reset []

  redis:
    ports: !reset []

networks:
  travelplanner:
    driver: bridge
