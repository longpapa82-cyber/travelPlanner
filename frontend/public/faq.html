<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="myTravel 자주 묻는 질문 - AI 여행 플래너 이용 가이드, 요금제, 기능 안내">
  <title>자주 묻는 질문 (FAQ) - myTravel | AI 여행 플래너</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6;
      color: #333;
      background-color: #f8f9fa;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    header {
      background: linear-gradient(135deg, #4A90D9 0%, #5BA3E8 100%);
      color: white;
      padding: 40px 20px;
      text-align: center;
      margin-bottom: 40px;
    }
    header h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }
    .faq-section {
      background: white;
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .faq-item {
      margin-bottom: 30px;
      padding-bottom: 30px;
      border-bottom: 1px solid #e9ecef;
    }
    .faq-question {
      font-size: 20px;
      font-weight: 600;
      color: #4A90D9;
      margin-bottom: 12px;
    }
    .faq-answer {
      font-size: 16px;
      color: #555;
      line-height: 1.8;
    }
    .cta-section {
      background: linear-gradient(135deg, #4A90D9 0%, #5BA3E8 100%);
      color: white;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      margin-top: 40px;
    }
    .download-button {
      display: inline-block;
      background: white;
      color: #4A90D9;
      padding: 14px 32px;
      border-radius: 25px;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <header>
    <h1>자주 묻는 질문 (FAQ)</h1>
    <p>myTravel 이용에 대한 모든 궁금증을 해결해드립니다</p>
  </header>
  <div class="container">
    <div class="faq-section">
      <div class="faq-item">
        <h2 class="faq-question">1. myTravel은 무엇인가요?</h2>
        <div class="faq-answer">
          <p>myTravel은 AI 기술을 활용하여 자동으로 맞춤 여행 일정을 만들어주는 스마트 여행 플래너 앱입니다.</p>
        </div>
      </div>
      <div class="faq-item">
        <h2 class="faq-question">2. 무료로 사용할 수 있나요?</h2>
        <div class="faq-answer">
          <p>네, myTravel의 기본 기능은 모두 무료로 제공됩니다.</p>
        </div>
      </div>
      <div class="faq-item">
        <h2 class="faq-question">3. 고객 지원은 어떻게 받나요?</h2>
        <div class="faq-answer">
          <p>이메일: <span id="support-email"></span></p>
          <p>응답 시간: 영업일 기준 7일 이내</p>
        </div>
      </div>
    </div>
    <div class="cta-section">
      <h2>더 많은 기능이 궁금하신가요?</h2>
      <a href="https://play.google.com/store/apps/details?id=com.longpapa82.travelplanner" class="download-button">
        무료로 앱 다운로드
      </a>
    </div>
  </div>
  <script>
    // Email rendering to bypass Cloudflare obfuscation
    document.addEventListener('DOMContentLoaded', function() {
      var emailElement = document.getElementById('support-email');
      if (emailElement) {
        var email = 'longpapa82' + '@' + 'gmail.com';
        var link = document.createElement('a');
        link.href = 'mailto:' + email;
        link.textContent = email;
        emailElement.appendChild(link);
      }
    });
  </script>
</body>
</html>
