server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://pagead2.googlesyndication.com https://maps.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://api.openai.com https://*.googleapis.com; frame-src https://pagead2.googlesyndication.com;" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Health check endpoint
    location = /health {
        access_log off;
        return 200 'healthy';
        add_header Content-Type text/plain;
    }

    # API reverse proxy to backend
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Static assets with long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Service worker - no cache to always get latest
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # Web app manifest
    location = /manifest.json {
        add_header Cache-Control "public, max-age=86400";
    }

    # robots.txt
    location = /robots.txt {
        expires 1d;
        access_log off;
    }

    # Sitemap proxy to backend
    location = /sitemap.xml {
        proxy_pass http://backend:3000/api/sitemap.xml;
        proxy_set_header Host $host;
        expires 1h;
    }

    # Shared trip pages — dynamic OG meta via backend SSR
    location ~ ^/trips/shared/([a-zA-Z0-9_-]+)$ {
        proxy_pass http://backend:3000/api/trips/og/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 404 502 = /index.html;
    }

    # SPA fallback — serve index.html for all other routes
    # Injects Open Graph meta tags via sub_filter
    location / {
        try_files $uri $uri/ /index.html;
        sub_filter '</head>' '
    <meta name="description" content="AI-powered travel planning. Pick your destination and get a complete itinerary instantly." />
    <link rel="canonical" href="https://travelplanner.app" />
    <meta property="og:title" content="TravelPlanner - Smart Travel Planning" />
    <meta property="og:description" content="AI-powered travel planning. Pick your destination and get a complete itinerary instantly." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://travelplanner.app" />
    <meta property="og:image" content="https://travelplanner.app/assets/og-image.png" />
    <meta property="og:site_name" content="TravelPlanner" />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta property="og:locale:alternate" content="ja_JP" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TravelPlanner - Smart Travel Planning" />
    <meta name="twitter:description" content="AI-powered travel planning. Pick your destination and get a complete itinerary instantly." />
    <meta name="twitter:image" content="https://travelplanner.app/assets/og-image.png" />
    <link rel="preconnect" href="https://maps.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://pagead2.googlesyndication.com" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#3B82F6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="TravelPlanner" />
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"TravelPlanner","url":"https://travelplanner.app","description":"AI-powered travel planning. Pick your destination and get a complete itinerary instantly.","applicationCategory":"TravelApplication","operatingSystem":"Web","offers":{"@type":"Offer","price":"0","priceCurrency":"USD"},"author":{"@type":"Organization","name":"TravelPlanner"}}</script>
    </head>';
        sub_filter_once on;
        sub_filter_types text/html;
    }
}
