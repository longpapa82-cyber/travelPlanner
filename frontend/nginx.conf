server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    # V189 P0-B: web payment provider retired 2026-04-21 (Google Play IAP
    # only). Removed external payment-vendor entries from CSP and from the
    # SPA fallback HTML below. Closes the V184 P0-G direct regression where
    # the third-party JS was still loading on every authenticated page,
    # violating GDPR Art.13 (privacy.html art3 had stopped listing it).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://pagead2.googlesyndication.com https://maps.googleapis.com https://www.googletagmanager.com https://adservice.google.com https://www.googletagservices.com https://googleads.g.doubleclick.net https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' blob: https://api.openai.com https://maps.googleapis.com https://www.googleapis.com https://exp.host https://pagead2.googlesyndication.com https://*.googlesyndication.com https://*.doubleclick.net https://*.adtrafficquality.google.com https://ep1.adtrafficquality.google.com https://*.google.com https://csi.gstatic.com; frame-src 'self' https://pagead2.googlesyndication.com https://tpc.googlesyndication.com https://*.doubleclick.net https://www.google.com;" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Block sensitive file types
    location ~* \.(key|pem|env|sh|sql|bak|conf|log|map)$ {
        deny all;
        return 404;
    }

    # Health check endpoint
    location = /health {
        access_log off;
        return 200 'healthy';
        add_header Content-Type text/plain;
    }

    # API reverse proxy to backend
    location /api/ {
        client_max_body_size 10m;
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Serve uploaded files from backend (photos are stored in backend container)
    location /uploads/ {
        proxy_pass http://backend:3000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Static assets with long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Service worker - no cache to always get latest
    location = /sw.js {
        root /static-content;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # Web app manifest
    location = /manifest.json {
        root /static-content;
        add_header Cache-Control "public, max-age=86400";
    }

    # Google Search Console verification
    location = /google1fa063c51a316444.html {
        root /static-content;
        access_log off;
    }

    # robots.txt
    location = /robots.txt {
        root /static-content;
        expires 1d;
        access_log off;
    }

    # Sitemap proxy to backend
    location = /sitemap.xml {
        proxy_pass http://backend:3000/api/sitemap.xml;
        proxy_set_header Host $host;
        expires 1h;
    }

    # Shared trip pages — dynamic OG meta via backend SSR
    location ~ ^/trips/shared/([a-zA-Z0-9_-]+)$ {
        proxy_pass http://backend:3000/api/trips/og/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 404 502 = /index.html;
    }

    # ─── Static content served from /static-content (volume-mountable) ───
    # HTML files are stored in /static-content instead of the SPA root.
    # Mount ./frontend/public:/static-content:ro in docker-compose
    # to update HTML instantly without Docker rebuild.

    # Landing page — exact match "/" serves landing.html
    location = / {
        root /static-content;
        try_files /landing.html =404;
        add_header Cache-Control "public, max-age=3600";
    }

    # About page
    location = /about {
        root /static-content;
        try_files /about.html =404;
        add_header Cache-Control "public, max-age=3600";
    }

    # Contact page
    location = /contact {
        root /static-content;
        try_files /contact.html =404;
        add_header Cache-Control "public, max-age=3600";
    }

    # Travel guide index
    location = /guides {
        root /static-content;
        try_files /guides/index.html =404;
        add_header Cache-Control "public, max-age=3600";
    }

    # Individual travel guide pages
    location ~ ^/guides/([a-z-]+)$ {
        root /static-content;
        try_files /guides/$1.html =404;
        add_header Cache-Control "public, max-age=3600";
    }

    # Legal pages (Korean)
    location = /privacy {
        root /static-content;
        try_files /privacy.html =404;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /terms {
        root /static-content;
        try_files /terms.html =404;
        add_header Cache-Control "public, max-age=3600";
    }

    # Legal pages (English)
    location = /privacy-en {
        root /static-content;
        try_files /privacy-en.html =404;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /terms-en {
        root /static-content;
        try_files /terms-en.html =404;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /disclaimer {
        return 301 /terms;
    }

    # FAQ page
    location = /faq {
        root /static-content;
        try_files /faq.html =404;
        add_header Cache-Control "public, max-age=3600";
    }

    # Blog index
    location = /blog {
        root /static-content;
        try_files /blog/index.html =404;
        add_header Cache-Control "public, max-age=3600";
    }

    # Individual blog articles
    location ~ ^/blog/([a-z0-9-]+)$ {
        root /static-content;
        try_files /blog/$1.html =404;
        add_header Cache-Control "public, max-age=3600";
    }

    # Android App Links / Apple App Site Association
    location /.well-known/ {
        root /static-content;
        default_type application/json;
        expires 1d;
        access_log off;
    }

    # ads.txt (AdSense verification)
    location = /ads.txt {
        root /static-content;
        charset utf-8;
        expires 1d;
        access_log off;
    }

    # ─── SPA fallback — serve index.html for app routes ───
    # All other routes (login, home, trips, etc.) fall through to the React app.
    # AdSense script is NOT injected here — only on public content pages above.
    location / {
        try_files $uri $uri/ /index.html;
        sub_filter '</head>' '
    <meta name="google" content="notranslate" />
    <meta name="description" content="AI 기반 여행 계획 서비스. 목적지만 선택하면 최적의 여행 일정이 완성됩니다." />
    <link rel="canonical" href="https://mytravel-planner.com" />
    <meta property="og:title" content="MyTravel - AI 여행 계획" />
    <meta property="og:description" content="목적지만 선택하면 AI가 최적의 여행 일정을 자동으로 만들어줍니다." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mytravel-planner.com" />
    <meta property="og:site_name" content="MyTravel" />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta property="og:locale:alternate" content="ja_JP" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MyTravel - AI 여행 계획" />
    <meta name="twitter:description" content="목적지만 선택하면 AI가 최적의 여행 일정을 자동으로 만들어줍니다." />
    <link rel="preconnect" href="https://maps.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
    <meta name="theme-color" content="#2563EB" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MyTravel" />
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"MyTravel","url":"https://mytravel-planner.com","description":"AI 기반 여행 계획 서비스. 목적지만 선택하면 최적의 여행 일정이 완성됩니다.","applicationCategory":"TravelApplication","operatingSystem":"Web","inLanguage":["ko","en","ja","zh","es","de","fr","th","vi","pt","ar","id","hi","it","ru","tr","ms"],"offers":{"@type":"Offer","price":"0","priceCurrency":"USD"},"author":{"@type":"Organization","name":"MyTravel"}}</script>
    </head>';
        sub_filter_once on;
        sub_filter_types text/html;
    }
}
