server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://pagead2.googlesyndication.com https://maps.googleapis.com https://www.googletagmanager.com https://adservice.google.com https://www.googletagservices.com https://googleads.g.doubleclick.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://api.openai.com https://maps.googleapis.com https://www.googleapis.com https://exp.host https://pagead2.googlesyndication.com https://*.googlesyndication.com https://*.doubleclick.net https://*.adtrafficquality.google.com https://*.google.com; frame-src 'self' https://pagead2.googlesyndication.com https://tpc.googlesyndication.com https://*.doubleclick.net https://www.google.com;" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Block sensitive file types
    location ~* \.(key|pem|env|sh|sql|bak|conf|log|map)$ {
        deny all;
        return 404;
    }

    # Health check endpoint
    location = /health {
        access_log off;
        return 200 'healthy';
        add_header Content-Type text/plain;
    }

    # API reverse proxy to backend
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Static assets with long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Service worker - no cache to always get latest
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # Web app manifest
    location = /manifest.json {
        add_header Cache-Control "public, max-age=86400";
    }

    # robots.txt
    location = /robots.txt {
        expires 1d;
        access_log off;
    }

    # Sitemap proxy to backend
    location = /sitemap.xml {
        proxy_pass http://backend:3000/api/sitemap.xml;
        proxy_set_header Host $host;
        expires 1h;
    }

    # Shared trip pages — dynamic OG meta via backend SSR
    location ~ ^/trips/shared/([a-zA-Z0-9_-]+)$ {
        proxy_pass http://backend:3000/api/trips/og/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 404 502 = /index.html;
    }

    # ─── Public content pages (static HTML for SEO & AdSense) ───
    # These pages serve content-rich HTML directly, bypassing the SPA.
    # Google crawlers see real text content instead of an empty login screen.

    # Landing page — exact match "/" serves landing.html
    location = / {
        try_files /landing.html =404;
        add_header Cache-Control "public, max-age=3600";
    }

    # About page
    location = /about {
        try_files /about.html =404;
        add_header Cache-Control "public, max-age=3600";
    }

    # Contact page
    location = /contact {
        try_files /contact.html =404;
        add_header Cache-Control "public, max-age=3600";
    }

    # Travel guide index
    location = /guides {
        try_files /guides/index.html =404;
        add_header Cache-Control "public, max-age=3600";
    }

    # Individual travel guide pages
    location ~ ^/guides/([a-z-]+)$ {
        try_files /guides/$1.html =404;
        add_header Cache-Control "public, max-age=3600";
    }

    # ─── SPA fallback — serve index.html for app routes ───
    # All other routes (login, home, trips, etc.) fall through to the React app.
    # AdSense script is NOT injected here — only on public content pages above.
    location / {
        try_files $uri $uri/ /index.html;
        sub_filter '</head>' '
    <meta name="description" content="AI 기반 여행 계획 서비스. 목적지만 선택하면 최적의 여행 일정이 완성됩니다." />
    <link rel="canonical" href="https://mytravelplanner.duckdns.org" />
    <meta property="og:title" content="TravelPlanner - AI 여행 계획" />
    <meta property="og:description" content="목적지만 선택하면 AI가 최적의 여행 일정을 자동으로 만들어줍니다." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mytravelplanner.duckdns.org" />
    <meta property="og:site_name" content="TravelPlanner" />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta property="og:locale:alternate" content="ja_JP" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TravelPlanner - AI 여행 계획" />
    <meta name="twitter:description" content="목적지만 선택하면 AI가 최적의 여행 일정을 자동으로 만들어줍니다." />
    <link rel="preconnect" href="https://maps.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
    <meta name="theme-color" content="#2563EB" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="TravelPlanner" />
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"TravelPlanner","url":"https://mytravelplanner.duckdns.org","description":"AI 기반 여행 계획 서비스. 목적지만 선택하면 최적의 여행 일정이 완성됩니다.","applicationCategory":"TravelApplication","operatingSystem":"Web","inLanguage":["ko","en","ja","zh","es","de","fr","th","vi"],"offers":{"@type":"Offer","price":"0","priceCurrency":"USD"},"author":{"@type":"Organization","name":"TravelPlanner"}}</script>
    </head>';
        sub_filter_once on;
        sub_filter_types text/html;
    }
}
