version: '3.8'

# Override for Hetzner CAX21 ARM instance (4 vCPU, 8GB RAM, 80GB NVMe)
# Usage: docker compose -f docker-compose.yml -f docker-compose.hetzner.yml -f docker-compose.ssl-arm.yml up -d
#
# Memory budget (8GB total):
#   OS + Docker engine:  ~800MB
#   postgres:            1.5GB
#   redis:               256MB
#   backend:             1.5GB
#   frontend:            256MB
#   proxy + certbot:     128MB
#   db-backup:           128MB
#   Build headroom:      ~3.3GB
#   Total:               ~7.9GB

services:
  postgres:
    ports: !reset []
    mem_limit: 1536m
    cpus: 1.0
    command: >
      postgres
        -c shared_buffers=384MB
        -c effective_cache_size=1GB
        -c work_mem=8MB
        -c maintenance_work_mem=128MB
        -c max_connections=60
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '3'

  redis:
    ports: !reset []
    mem_limit: 256m
    cpus: 0.5
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:-redis_secure_password_change_me}
        --maxmemory 128mb
        --maxmemory-policy volatile-lru
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  backend:
    ports: !reset []
    mem_limit: 1536m
    cpus: 1.5
    environment:
      NODE_OPTIONS: "--max-old-space-size=1024"
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '5'

  frontend:
    ports: !reset []
    mem_limit: 256m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  db-backup:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - ./backups:/backups
    entrypoint: >
      /bin/sh -c "
        while true; do
          sleep_until=$$(date -d 'tomorrow 03:00' +%s 2>/dev/null || date -v+1d -v3H -v0M -v0S +%s 2>/dev/null || echo 86400);
          now=$$(date +%s);
          sleep_secs=$$((sleep_until - now));
          if [ $$sleep_secs -le 0 ] || [ $$sleep_secs -gt 86400 ]; then sleep_secs=86400; fi;
          sleep $$sleep_secs;
          FNAME=/backups/travelplanner_$$(date +%Y%m%d_%H%M%S).sql.gz;
          pg_dump -h postgres -U $${DB_USERNAME:-postgres} travelplanner | gzip > $$FNAME;
          if [ $$? -eq 0 ]; then echo \"Backup OK: $$FNAME\"; else echo \"Backup FAILED\"; fi;
          find /backups -name '*.sql.gz' -mtime +14 -delete 2>/dev/null;
        done
      "
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - travelplanner
    mem_limit: 128m
    cpus: 0.2
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: '5m'
        max-file: '2'

networks:
  travelplanner:
    driver: bridge
