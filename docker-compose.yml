version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: travelplanner
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - travelplanner
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secure_password_change_me}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis_secure_password_change_me}', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - travelplanner
    restart: unless-stopped

  backend:
    image: travelplanner-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '${PORT:-3000}:3000'
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secure_password_change_me}
      NODE_ENV: production
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://localhost:3000/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - travelplanner
    restart: unless-stopped

  frontend:
    image: travelplanner-frontend:latest
    build:
      context: ./frontend
      args:
        ADSENSE_CLIENT_ID: ${ADSENSE_CLIENT_ID:-}
        ADSENSE_DEFAULT_SLOT: ${ADSENSE_DEFAULT_SLOT:-}
        EXPO_PUBLIC_GOOGLE_MAPS_KEY: ${EXPO_PUBLIC_GOOGLE_MAPS_KEY:-}
        EXPO_PUBLIC_PADDLE_CLIENT_TOKEN: ${EXPO_PUBLIC_PADDLE_CLIENT_TOKEN:-}
        EXPO_PUBLIC_PADDLE_ENVIRONMENT: ${EXPO_PUBLIC_PADDLE_ENVIRONMENT:-sandbox}
    ports:
      - '${FRONTEND_PORT:-8080}:8080'
    volumes:
      - ./frontend/public:/static-content:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8080/health || exit 1']
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - travelplanner
    restart: unless-stopped

networks:
  travelplanner:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads_data:
