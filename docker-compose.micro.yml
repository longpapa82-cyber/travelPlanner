version: '3.8'

# Lightweight override for 1GB RAM server (VM.Standard.E2.1.Micro)
# Usage: docker compose -f docker-compose.yml -f docker-compose.micro.yml up -d

services:
  postgres:
    ports: !reset []
    mem_limit: 200m
    cpus: 0.5
    command: >
      postgres
        -c shared_buffers=64MB
        -c effective_cache_size=128MB
        -c work_mem=2MB
        -c maintenance_work_mem=32MB
        -c max_connections=30
    logging:
      driver: json-file
      options:
        max-size: '5m'
        max-file: '2'

  redis:
    ports: !reset []
    mem_limit: 48m
    cpus: 0.25
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:-redis_secure_password_change_me}
        --maxmemory 32mb
        --maxmemory-policy allkeys-lru
    logging:
      driver: json-file
      options:
        max-size: '5m'
        max-file: '2'

  backend:
    ports: !reset []
    mem_limit: 300m
    cpus: 0.75
    environment:
      NODE_OPTIONS: "--max-old-space-size=200"
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  frontend:
    ports:
      - '80:80'
    mem_limit: 64m
    cpus: 0.25
    logging:
      driver: json-file
      options:
        max-size: '5m'
        max-file: '2'

networks:
  travelplanner:
    driver: bridge
